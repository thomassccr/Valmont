<style>

    display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
    margin:38px 0 44px; max-width:720px;
  }
  .chip {
    display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.035); border:1px solid rgba(255,255,255,0.08);
    border-radius:999px; padding:9px 18px; font-size:13px; color:#c8c4be;
  }
  .chip .dot { width:7px; height:7px; border-radius:50%; background:#3d8ef0; box-shadow:0 0 8px rgba(61,142,240,.8); flex-shrink:0; }
  .dl-btn {
    display:inline-flex; align-items:center; gap:12px;
    background:#3d8ef0; color:#fff; text-decoration:none;
    font-size:16.5px; font-weight:600; padding:17px 40px; border-radius:14px;
    box-shadow:0 10px 34px rgba(61,142,240,.35);
    transition:transform .18s cubic-bezier(.34,1.4,.64,1), box-shadow .18s, background .18s;
  }
  .dl-btn:hover { transform:translateY(-2px); background:#2f7ae0; box-shadow:0 16px 44px rgba(61,142,240,.45); }
  .dl-btn svg { width:19px; height:19px; }
  .dl-note { margin-top:16px; font-size:12.5px; color:#666; }
  .dl-note b { color:#8a8680; font-weight:500; }
  footer {
    position:fixed; bottom:18px; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:14px;
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em; color:#4a4844;
  }
  footer a { color:#3a3834; text-decoration:none; transition:color .15s; }
  footer a:hover { color:#8a8680; }
